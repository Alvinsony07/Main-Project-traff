<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Traffic Vision User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            text-align: center;
            position: relative;
        }

        .logo-large {
            margin-bottom: 2rem;
            color: white;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-large i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 15px var(--accent-dim));
        }

        .logo-large h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .input-group label {
            text-align: left;
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .flash-msg {
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .flash-msg.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card glass-panel">
            <a href="{{ url_for('index') }}" class="logo-large">
                <i class="fas fa-camera-retro"></i>
                <h1>Traffic Vision AI</h1>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem; font-weight: 500;">
                    USER REGISTRATION
                </p>
            </a>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="flash-msg error">
                <i class="fas fa-exclamation-circle"></i> {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" id="registerForm">
                <div class="input-group">
                    <label>Access ID (Username)</label>
                    <input type="text" name="username" placeholder="Choose a username" required minlength="3"
                        autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" placeholder="Your full name" required>
                </div>

                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="tel" name="phone_number" placeholder="Phone Number" required pattern="[0-9]{10,15}"
                        title="Enter a valid phone number (10-15 digits)">
                </div>

                <div class="input-group">
                    <label>Organization / Department</label>
                    <input type="text" name="organization" placeholder="Optional">
                </div>

                <div class="input-group">
                    <label>Passcode</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6">
                </div>

                <div class="input-group">
                    <label>Confirm Passcode</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required
                        minlength="6">
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 1.5rem; width: 100%;">
                    <i class="fas fa-user-plus"></i> CREATE ACCOUNT
                </button>
            </form>

            <div style="margin-top: 2rem; text-align: center;">
                <a href="{{ url_for('login') }}"
                    style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: 0.2s;">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        // Password strength meter
        const pwdInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm_password');

        // Create strength meter UI
        const meterWrap = document.createElement('div');
        meterWrap.style.cssText = 'margin-top:6px;';
        meterWrap.innerHTML = `
            <div style="display:flex;gap:3px;margin-bottom:4px;">
                <div id="str-bar-1" style="flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;transition:all 0.3s;"></div>
                <div id="str-bar-2" style="flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;transition:all 0.3s;"></div>
                <div id="str-bar-3" style="flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;transition:all 0.3s;"></div>
                <div id="str-bar-4" style="flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;transition:all 0.3s;"></div>
            </div>
            <div id="str-label" style="font-size:0.68rem;color:#64748b;letter-spacing:0.3px;"></div>
        `;
        pwdInput.parentElement.appendChild(meterWrap);

        // Match indicator
        const matchMsg = document.createElement('div');
        matchMsg.id = 'match-msg';
        matchMsg.style.cssText = 'font-size:0.72rem;margin-top:4px;';
        confirmInput.parentElement.appendChild(matchMsg);

        function assessStrength(pwd) {
            let score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 10) score++;
            if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            return Math.min(score, 4);
        }

        const strengthColors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#10b981'];
        const strengthLabels = ['', 'Weak', 'Fair', 'Good', 'Strong'];

        pwdInput.addEventListener('input', function () {
            const score = assessStrength(this.value);
            for (let i = 1; i <= 4; i++) {
                const bar = document.getElementById('str-bar-' + i);
                bar.style.background = i <= score ? strengthColors[score] : 'rgba(255,255,255,0.08)';
            }
            document.getElementById('str-label').textContent = this.value ? strengthLabels[score] : '';
            document.getElementById('str-label').style.color = strengthColors[score];
            checkMatch();
        });

        confirmInput.addEventListener('input', checkMatch);

        function checkMatch() {
            const msg = document.getElementById('match-msg');
            if (!confirmInput.value) { msg.textContent = ''; return; }
            if (pwdInput.value === confirmInput.value) {
                msg.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
                msg.style.color = '#10b981';
            } else {
                msg.innerHTML = '<i class="fas fa-times-circle"></i> Passwords do not match';
                msg.style.color = '#ef4444';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            if (pwdInput.value !== confirmInput.value) {
                e.preventDefault();
                alert('Passwords do not match. Please try again.');
                return;
            }
            if (assessStrength(pwdInput.value) < 2) {
                e.preventDefault();
                alert('Password is too weak. Use at least 6 characters with uppercase and numbers.');
            }
        });
    </script>
</body>

</html>

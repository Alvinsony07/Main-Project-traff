<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Vision AI | Reports & Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }

        .filter-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .filter-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .filter-btn:hover {
            opacity: 0.9;
        }

        .reset-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .reset-btn:hover {
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .data-table th,
        .data-table td {
            padding: 14px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table th {
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.75rem;
        }

        .data-table tr {
            transition: background 0.2s;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.high {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .badge.medium {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .badge.low {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        /* Pagination */
        .pagination-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .page-buttons {
            display: flex;
            gap: 4px;
        }

        .page-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
        }

        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 700;
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Stats summary */
        .stats-summary {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-chip .chip-val {
            font-size: 1.4rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .stat-chip .chip-lbl {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.3;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        {% set active_page = 'reports' %}
        {% include 'partials/sidebar.html' %}

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar glass-panel" style="margin-bottom: 20px;">
                <h2 style="margin:0;font-size:1.4rem;"><i class="fas fa-clipboard-list"
                        style="color:var(--accent);"></i> Historical Logs & Reports</h2>
                <div class="header-actions">
                    <a href="/api/export_stats" class="btn-primary" style="text-decoration:none;"><i
                            class="fas fa-download"></i> Export CSV</a>
                    <a href="/api/generate_pdf" class="btn-primary"
                        style="text-decoration:none; background:var(--purple); border-color:var(--purple);"><i
                            class="fas fa-file-pdf"></i> Generate Report</a>
                </div>
            </header>

            <!-- Summary Stats -->
            <div class="stats-summary" id="stats-summary">
                <div class="stat-chip">
                    <div>
                        <div class="chip-val" id="total-records" style="color:var(--accent);">-</div>
                        <div class="chip-lbl">Total Records</div>
                    </div>
                </div>
                <div class="stat-chip">
                    <div>
                        <div class="chip-val" id="showing-count" style="color:var(--success);">-</div>
                        <div class="chip-lbl">Showing</div>
                    </div>
                </div>
                <div class="stat-chip">
                    <div>
                        <div class="chip-val" id="page-count" style="color:var(--warning);">-</div>
                        <div class="chip-lbl">Pages</div>
                    </div>
                </div>
            </div>

            <div class="glass-panel" style="padding: 25px;">
                <div class="report-header">
                    <h3 style="margin:0;"><i class="fas fa-database"></i> Traffic Volume Records</h3>
                    <div class="filter-bar">
                        <span style="font-size:0.85rem;"><i class="fas fa-filter"></i> Filter:</span>
                        <input type="date" class="filter-input" id="filter-date">
                        <select class="filter-input" id="filter-lane">
                            <option value="">All Lanes</option>
                            <option value="1">Lane 1</option>
                            <option value="2">Lane 2</option>
                            <option value="3">Lane 3</option>
                            <option value="4">Lane 4</option>
                        </select>
                        <select class="filter-input" id="filter-density">
                            <option value="">Any Density</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                        <button class="filter-btn" onclick="loadData(1)"><i class="fas fa-search"></i> Apply</button>
                        <button class="reset-btn" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset</button>
                    </div>
                </div>

                <div style="overflow-x:auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Record ID</th>
                                <th>Timestamp</th>
                                <th>Lane</th>
                                <th>Vehicle Count</th>
                                <th>Density Level</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr>
                                <td colspan="5" style="text-align:center;">Loading Data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination-bar" id="pagination-bar"></div>
            </div>
        </main>
    </div>

    <script>
        let currentPage = 1;
        const perPage = 20;

        function loadData(page) {
            currentPage = page || 1;
            const date = document.getElementById('filter-date').value;
            const lane = document.getElementById('filter-lane').value;
            const density = document.getElementById('filter-density').value;

            let url = `/api/reports_data?page=${currentPage}&per_page=${perPage}`;
            if (date) url += `&date=${date}`;
            if (lane !== '') url += `&lane=${lane}`;
            if (density) url += `&density=${density}`;

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    // Update summary
                    document.getElementById('total-records').textContent = data.total;
                    document.getElementById('showing-count').textContent = data.records.length;
                    document.getElementById('page-count').textContent = data.pages;

                    tbody.innerHTML = '';

                    if (data.records.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" class="empty-state"><i class="fas fa-inbox"></i>No records found matching your filters.</td></tr>`;
                        document.getElementById('pagination-bar').innerHTML = '';
                        return;
                    }

                    data.records.forEach(row => {
                        const tr = document.createElement('tr');
                        const badgeClass = row.density === 'High' ? 'high' : (row.density === 'Medium' ? 'medium' : 'low');

                        const idCell = document.createElement('td');
                        idCell.textContent = `#TRF-${row.id}`;
                        idCell.style.color = 'var(--text-secondary)';
                        tr.appendChild(idCell);

                        const timeCell = document.createElement('td');
                        timeCell.innerHTML = `<i class="far fa-clock" style="color:var(--text-secondary);margin-right:5px;"></i>${row.timestamp}`;
                        tr.appendChild(timeCell);

                        const laneCell = document.createElement('td');
                        laneCell.textContent = `Lane 0${row.lane_id}`;
                        tr.appendChild(laneCell);

                        const countCell = document.createElement('td');
                        countCell.innerHTML = `<strong>${row.vehicle_count}</strong> vehicles`;
                        tr.appendChild(countCell);

                        const badgeCell = document.createElement('td');
                        const badge = document.createElement('span');
                        badge.className = `badge ${badgeClass}`;
                        badge.textContent = row.density;
                        badgeCell.appendChild(badge);
                        tr.appendChild(badgeCell);

                        tbody.appendChild(tr);
                    });

                    // Build pagination
                    buildPagination(data);
                })
                .catch(err => {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--danger);"><i class="fas fa-exclamation-triangle"></i> Failed to load data.</td></tr>`;
                });
        }

        function buildPagination(data) {
            const bar = document.getElementById('pagination-bar');
            const total = data.pages;
            const current = data.current_page;

            let html = `<div class="page-info">Page ${current} of ${total} (${data.total} records)</div>`;
            html += '<div class="page-buttons">';

            // Previous
            html += `<button class="page-btn" onclick="loadData(${current - 1})" ${!data.has_prev ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;

            // Page numbers (show max 7)
            let start = Math.max(1, current - 3);
            let end = Math.min(total, start + 6);
            start = Math.max(1, end - 6);

            if (start > 1) {
                html += `<button class="page-btn" onclick="loadData(1)">1</button>`;
                if (start > 2) html += `<button class="page-btn" disabled>...</button>`;
            }

            for (let i = start; i <= end; i++) {
                html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="loadData(${i})">${i}</button>`;
            }

            if (end < total) {
                if (end < total - 1) html += `<button class="page-btn" disabled>...</button>`;
                html += `<button class="page-btn" onclick="loadData(${total})">${total}</button>`;
            }

            // Next
            html += `<button class="page-btn" onclick="loadData(${current + 1})" ${!data.has_next ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;

            html += '</div>';
            bar.innerHTML = html;
        }

        function resetFilters() {
            document.getElementById('filter-date').value = '';
            document.getElementById('filter-lane').value = '';
            document.getElementById('filter-density').value = '';
            loadData(1);
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', () => loadData(1));
    </script>
</body>

</html>
